<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GPA & CGPA Calculator</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        margin: 0;
        padding: 0;
    }
    .container {
        max-width: 900px;
        margin: 40px auto;
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
    }
    th, td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
    }
    th {
        background: #4facfe;
        color: white;
    }
    input {
        width: 90%;
        padding: 6px;
        border-radius: 6px;
        border: 1px solid #ccc;
        text-align: center;
    }
    button {
        background: #4facfe;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }
    button:hover {
        background: #00c6ff;
    }
    .result {
        margin-top: 20px;
        padding: 15px;
        background: #f4f9ff;
        border-radius: 10px;
        font-size: 18px;
    }
    .cgpa-box {
        margin-top: 25px;
        padding: 20px;
        background: #e8f5ff;
        border-radius: 12px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🎓 GPA & CGPA Calculator</h1>

    <table>
        <tr>
            <th>Subject</th>
            <th>Obtained</th>
            <th>Total</th>
            <th>Credit Hours</th>
        </tr>
        <tr><td>1</td><td><input id="o1"></td><td><input id="t1"></td><td><input id="c1"></td></tr>
        <tr><td>2</td><td><input id="o2"></td><td><input id="t2"></td><td><input id="c2"></td></tr>
        <tr><td>3</td><td><input id="o3"></td><td><input id="t3"></td><td><input id="c3"></td></tr>
        <tr><td>4</td><td><input id="o4"></td><td><input id="t4"></td><td><input id="c4"></td></tr>
        <tr><td>5</td><td><input id="o5"></td><td><input id="t5"></td><td><input id="c5"></td></tr>
        <tr><td>6</td><td><input id="o6"></td><td><input id="t6"></td><td><input id="c6"></td></tr>
    </table>

    <center><button onclick="calculateGPA()">Calculate GPA</button></center>

    <div class="result" id="gpaResult"></div>

    <div class="cgpa-box">
        <h3>📘 CGPA Calculator</h3>
        Previous CGPA: <input id="prevCgpa">
        Previous Credits: <input id="prevCredits">
        <br><br>
        <button onclick="calculateCGPA()">Calculate CGPA</button>
        <div class="result" id="cgpaResult"></div>
    </div>
</div>

<script>
function gradePoint(p) {
    if (p >= 90) return 4;
    if (p >= 85) return 3.75 + ((p - 85) / 4) * 0.20;
    if (p >= 80) return 3.50 + ((p - 80) / 4) * 0.20;
    if (p >= 75) return 3.25 + ((p - 75) / 4) * 0.20;
    if (p >= 70) return 3.00 + ((p - 70) / 4) * 0.20;
    if (p >= 65) return 2.75 + ((p - 65) / 4) * 0.20;
    if (p >= 60) return 2.50 + ((p - 60) / 4) * 0.20;
    if (p >= 55) return 2.25 + ((p - 55) / 4) * 0.20;
    if (p >= 50) return 2.00 + ((p - 50) / 4) * 0.20;
    return 0;
}

let currentGPA = 0;
let currentCredits = 0;

function calculateGPA() {
    let totalQP = 0;
    currentCredits = 0;

    for (let i = 1; i <= 6; i++) {
        let o = parseFloat(document.getElementById("o"+i).value);
        let t = parseFloat(document.getElementById("t"+i).value);
        let c = parseFloat(document.getElementById("c"+i).value);

        if (!o || !t || !c) continue;

        let percent = (o / t) * 100;
        let gp = gradePoint(percent);
        totalQP += gp * c;
        currentCredits += c;
    }

    currentGPA = (totalQP / currentCredits).toFixed(2);
    document.getElementById("gpaResult").innerHTML =
        "✅ <b>Semester GPA:</b> " + currentGPA;
}

function calculateCGPA() {
    let prevCgpa = parseFloat(document.getElementById("prevCgpa").value);
    let prevCredits = parseFloat(document.getElementById("prevCredits").value);

    let totalQP = (prevCgpa * prevCredits) + (currentGPA * currentCredits);
    let totalCredits = prevCredits + currentCredits;

    let cgpa = (totalQP / totalCredits).toFixed(2);

    document.getElementById("cgpaResult").innerHTML =
        "🎯 <b>Updated CGPA:</b> " + cgpa;
}
</script>

</body>
</html>
